id: "route"
text: |
  You are the route block of the meta-workflow.
  Classify the user's intent into one of: build, update, refine.
  - build: user wants to create a new workflow from scratch
  - update: user wants to modify an existing workflow's structure or blocks
  - refine: user wants to improve instructions for a specific block without changing structure
  Route to interview for build/update, or directly to author for refine.
