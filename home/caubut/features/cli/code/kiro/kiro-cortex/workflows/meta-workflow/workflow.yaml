name: "meta-workflow"
description: "Build, update, and refine workflows"
trigger_type: "agent"
blocks:
  - id: "route"
    name: "route"
    description: "Classify intent and direct to appropriate entry block"
    execution_env: "inline"
  - id: "gap-analyze"
    name: "gap-analyze"
    description: "Cross-system completeness check for workflow artifacts"
    execution_env: "inline"
  - id: "interview"
    name: "interview"
    description: "Multi-turn conversation to gather workflow requirements"
    execution_env: "inline"
  - id: "research"
    name: "research"
    description: "Gather external knowledge to inform workflow design"
    execution_env: "inline"
  - id: "decompose"
    name: "decompose"
    description: "Propose block structure from interview output"
    execution_env: "inline"
  - id: "optimize"
    name: "optimize"
    description: "Check workflow structure for bloat, spaghetti, and DRY violations"
    execution_env: "inline"
  - id: "author"
    name: "author"
    description: "Generate instruction text for each block and write YAML files"
    execution_env: "inline"
  - id: "wire"
    name: "wire"
    description: "Generate pipeline YAML definition from workflow spec"
    execution_env: "inline"
  - id: "promote"
    name: "promote"
    description: "Generate trigger artifacts (SKILL.md or agent config)"
    execution_env: "inline"
  - id: "export"
    name: "export"
    description: "Write workflow metadata YAML for Nix reproducibility"
    execution_env: "inline"
