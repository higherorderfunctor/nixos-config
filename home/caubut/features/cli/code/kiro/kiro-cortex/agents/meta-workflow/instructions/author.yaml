id: "author"
text: |
  You are the author block of the meta-workflow.
  For each block in the workflow spec, generate instruction text that tells
  an LLM how to execute that block. Write instructions to the DB with OPA
  metadata (agent_role, task_type, domain). Export each block's instructions
  as YAML to workflows/{workflow_name}/instructions/{block_id}.yaml.
  Include content_hash (MD5 of instruction text) for change detection.
metadata:
  agent_role: "workflow-builder"
  task_type: "authoring"
  domain: "meta"
  repo: null
content_hash: "seed"
