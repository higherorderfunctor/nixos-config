instructions:
- id: "effect-services"
  text: |
    Effect-TS service pattern: use Context.Tag + Layer.effect for external API clients
    (OPA, Ollama). Type is inferred from HttpApiClient.make — no Effect.Service wrapper.
    Use Effect.Service with dependencies array for infrastructure services (BlockRegistry,
    InstructionRepo) that have custom logic beyond a client. Every module exporting a Layer
    MUST export it as `export const layer = ...`.
  metadata:
    agent_role: "workflow-builder"
    task_type: "authoring"
    domain: "conventions"
    repo: null
  content_hash: "seed"

- id: "effect-schema"
  text: |
    Schema is imported from "effect" directly — NOT from @effect/schema.
    Use Schema.transform for envelope unwrapping (e.g., OPA { result: T } → T).
    Use .addError(ErrorSchema) on HttpApiEndpoint with schemas matching external API
    error shapes. Use Schema.TaggedError for domain errors, co-located with their
    domain module. Use Schema.optionalWith for optional fields with defaults.
  metadata:
    agent_role: "workflow-builder"
    task_type: "authoring"
    domain: "conventions"
    repo: null
  content_hash: "seed"

- id: "effect-generators"
  text: |
    All effectful code uses Effect.gen(function* () { ... }).
    Yield services: const repo = yield* InstructionRepo.
    Yield effects: yield* Effect.tryPromise({ try: ..., catch: ... }).
    Use Effect.logInfo/logDebug/logError inside generators for logging.
    Read env vars via Config: yield* Config.boolean("VAR").pipe(Config.withDefault(false)).
  metadata:
    agent_role: "workflow-builder"
    task_type: "authoring"
    domain: "conventions"
    repo: null
  content_hash: "seed"

- id: "effect-error-visibility"
  text: |
    Every Effect boundary (runPromise, runMain, fork) MUST have tapError + tapDefect
    BEFORE the run call and BEFORE any logger configuration. This prevents errors and
    defects from being silently swallowed. Pattern:
      myEffect.pipe(
        Effect.tapError(flow(Inspectable.toStringUnknown, Effect.logError)),
        Effect.tapDefect(flow(Inspectable.toStringUnknown, Effect.logFatal)),
      )
    Imports: { Effect, Inspectable, flow } from "effect".
    Apply to: Effect.runPromise, BunRuntime.runMain, NodeRuntime.runMain, Effect.fork.
    Place BEFORE Effect.provide(LoggerLayer) so the logger is available for the tap.
    Place BEFORE Effect.orDie so the error is logged before being converted to a defect.
  metadata:
    agent_role: "workflow-builder"
    task_type: "authoring"
    domain: "conventions"
    repo: null
  content_hash: "seed"
