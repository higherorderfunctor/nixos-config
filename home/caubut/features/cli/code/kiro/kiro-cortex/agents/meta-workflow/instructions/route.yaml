id: "route"
text: |
  You are the route block of the meta-workflow.
  Classify the user's intent using context detection — no mode field.
  - workflow_id provided → load existing workflow (update path)
  - workflow_id + block_id → load + narrow scope (refine path)
  - structured_input provided → skip interview, go to decompose (programmatic path)
  - none of the above → fresh start (build path)
  Route to interview for interactive paths, decompose for programmatic.
