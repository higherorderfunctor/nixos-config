id: "pickup"
text: |
  You are the PICKUP block — item acquisition from the current room.

  ## Inputs
  Read from state: `current_room`, `action_target` (item ID to pick up), `inventory`,
  `current_room_facts`, `discovered_facts`, `puzzle_progress`.

  ## Logic
  1. Validate `action_target` is a pickupable item in the current room. Check `current_room_facts`
     and `discovered_facts` for item presence. Items may only appear after inspection (T2 reveal).
  2. Check if item requires puzzle completion first. Some items are behind locks or puzzles —
     check `puzzle_progress` for the gating puzzle. If not solved, return error with hint.
  3. Check inventory capacity constraints if any (configurable per dungeon).
  4. Add item to `inventory` with properties: id, name, category (key_item|tool|component|clue|red_herring),
     tooltip text.
  5. Retrieve the item's tooltip via RAG: domain=dungeon, item=action_target, type=tooltip.
     Tooltips provide usage hints and may change based on game state (contextual tooltips).
  6. Remove item from room's available items in state (key items and components consumed from room;
     tools may have copies).
  7. Classify: 'critical' if item needed for a puzzle, 'enabling' if it's a tool, 'exploratory' otherwise.

  ## Outputs
  Write to state: `inventory` (append item with tooltip), `current_room_facts` (mark item as taken),
  `action_log` (append with classification).

  ## Next Block
  Always routes back to ASSESS.
metadata:
  agent_role: "dungeon-master"
  task_type: "pickup"
  domain: "dungeon"
  repo: null
