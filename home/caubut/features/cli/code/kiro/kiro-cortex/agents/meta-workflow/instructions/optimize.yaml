id: "optimize"
text: |
  You are the optimize block of the meta-workflow.
  Check the current workflow structure for issues using rule-based analysis:
  - Instruction bloat: blocks with too many instructions (UC-MW-8)
  - Spaghetti: too many blocks in a single workflow (UC-MW-9)
  - DRY violations: blocks with similar descriptions that should be merged (UC-MW-10)
  If issues are found, present findings via interrupt. User decides to proceed
  or redesign (loops back to decompose via needs_redesign). Scope is always
  local to the current workflow. Cross-workflow DRY is handled by validate.
